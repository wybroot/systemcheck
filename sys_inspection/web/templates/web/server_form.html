{% extends "base.html" %}
{% block title %}{{ '添加服务器' if not server_id else '编辑服务器' }} - {{ app_name }}{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">{{ '添加服务器' if not server_id else '编辑服务器' }}</h4>
        <a href="{{ url_for('servers.list_servers') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> 返回
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <form id="serverForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">主机名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="hostname" id="hostname" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">IP地址 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="ip" id="ip" placeholder="192.168.1.10" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">SSH端口</label>
                        <input type="number" class="form-control" name="ssh_port" id="ssh_port" value="22" min="1" max="65535">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">SSH用户</label>
                        <input type="text" class="form-control" name="ssh_user" id="ssh_user" value="root">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">SSH密码</label>
                        <div class="input-group">
                            <input type="password" class="form-control" name="ssh_password" id="ssh_password" placeholder="留空则使用免密登录">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                                <i class="bi bi-eye" id="passwordIcon"></i>
                            </button>
                        </div>
                        <small class="text-muted">为空时使用SSH免密登录</small>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">业务</label>
                        <input type="text" class="form-control" name="business" id="business" placeholder="如：电商平台">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">环境</label>
                        <select class="form-select" name="env" id="env">
                            <option value="">请选择</option>
                            <option value="生产">生产</option>
                            <option value="测试">测试</option>
                            <option value="开发">开发</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" name="status" id="status">
                            <option value="1">在线</option>
                            <option value="0">下线</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">服务</label>
                    <input type="text" class="form-control" name="services" id="services" placeholder="多个服务用|分隔，如：nginx|mysql|redis">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">标签</label>
                    <input type="text" class="form-control" name="tags" id="tags" placeholder="多个标签用逗号分隔">
                </div>
                
                <div class="d-flex justify-content-end">
                    <a href="{{ url_for('servers.list_servers') }}" class="btn btn-outline-secondary me-2">取消</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const serverId = {{ server_id | tojson if server_id else 'null' }};

function togglePassword() {
    const input = document.getElementById('ssh_password');
    const icon = document.getElementById('passwordIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}

function loadServer() {
    if (!serverId) return;
    
    axios.get(`/api/servers/${serverId}`)
        .then(response => {
            const server = response.data;
            document.getElementById('hostname').value = server.hostname || '';
            document.getElementById('ip').value = server.ip || '';
            document.getElementById('ssh_port').value = server.ssh_port || 22;
            document.getElementById('ssh_user').value = server.ssh_user || 'root';
            document.getElementById('business').value = server.business || '';
            document.getElementById('env').value = server.env || '';
            document.getElementById('status').value = server.status || 1;
            document.getElementById('services').value = server.services || '';
            document.getElementById('tags').value = server.tags || '';
        })
        .catch(error => {
            alert('加载服务器信息失败: ' + error.response?.data?.error || error.message);
        });
}

document.getElementById('serverForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const data = {
        hostname: document.getElementById('hostname').value,
        ip: document.getElementById('ip').value,
        ssh_port: parseInt(document.getElementById('ssh_port').value) || 22,
        ssh_user: document.getElementById('ssh_user').value || 'root',
        ssh_password: document.getElementById('ssh_password').value || '',
        business: document.getElementById('business').value,
        env: document.getElementById('env').value,
        status: parseInt(document.getElementById('status').value) || 1,
        services: document.getElementById('services').value,
        tags: document.getElementById('tags').value
    };
    
    const request = serverId 
        ? axios.put(`/api/servers/${serverId}`, data)
        : axios.post('/api/servers', data);
    
    request
        .then(response => {
            alert(serverId ? '更新成功' : '添加成功');
            window.location.href = '/servers';
        })
        .catch(error => {
            alert('保存失败: ' + error.response?.data?.error || error.message);
        });
});

loadServer();
</script>
{% endblock %}
