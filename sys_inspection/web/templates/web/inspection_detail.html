{% extends "base.html" %}
{% block title %}巡检详情 - {{ app_name }}{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">巡检详情</h4>
        <a href="{{ url_for('inspections.list_inspections') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> 返回列表
        </a>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header">
                    <h6 class="mb-0">基本信息</h6>
                </div>
                <div class="card-body" id="basicInfo">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
            
            <div class="card mb-4">
                <div class="card-header">
                    <h6 class="mb-0">资源使用</h6>
                </div>
                <div class="card-body" id="resourceUsage">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0">检查明细</h6>
                </div>
                <div class="card-body">
                    <ul class="nav nav-tabs" id="categoryTabs">
                        <li class="nav-item">
                            <a class="nav-link active" data-bs-toggle="tab" href="#cpu">CPU</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#memory">内存</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#disk">磁盘</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#network">网络</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#process">进程</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#security">安全</a>
                        </li>
                    </ul>
                    <div class="tab-content pt-3" id="categoryContent">
                        <div class="tab-pane fade show active" id="cpu">
                            <pre id="cpuResult">加载中...</pre>
                        </div>
                        <div class="tab-pane fade" id="memory">
                            <pre id="memoryResult">加载中...</pre>
                        </div>
                        <div class="tab-pane fade" id="disk">
                            <pre id="diskResult">加载中...</pre>
                        </div>
                        <div class="tab-pane fade" id="network">
                            <pre id="networkResult">加载中...</pre>
                        </div>
                        <div class="tab-pane fade" id="process">
                            <pre id="processResult">加载中...</pre>
                        </div>
                        <div class="tab-pane fade" id="security">
                            <pre id="securityResult">加载中...</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const inspectionId = {{ inspection_id }};

function loadInspectionDetail() {
    axios.get(`/api/inspections/${inspectionId}`)
        .then(response => {
            const data = response.data;
            
            const statusClass = data.status === 'OK' ? 'status-ok' : 
                               data.status === 'WARNING' ? 'status-warning' : 'status-critical';
            
            document.getElementById('basicInfo').innerHTML = `
                <table class="table table-sm">
                    <tr><td width="100">服务器</td><td>${data.server_hostname || '-'}</td></tr>
                    <tr><td>巡检时间</td><td>${new Date(data.inspection_time).toLocaleString()}</td></tr>
                    <tr><td>状态</td><td><span class="status-badge ${statusClass}">${data.status}</span></td></tr>
                    <tr><td>耗时</td><td>${data.duration ? data.duration + '秒' : '-'}</td></tr>
                </table>
            `;
            
            document.getElementById('resourceUsage').innerHTML = `
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span>CPU</span>
                        <span>${data.cpu_usage || 0}%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar bg-${data.cpu_usage > 80 ? 'danger' : data.cpu_usage > 60 ? 'warning' : 'success'}" 
                             style="width: ${data.cpu_usage || 0}%"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span>内存</span>
                        <span>${data.memory_usage || 0}%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar bg-${data.memory_usage > 85 ? 'danger' : data.memory_usage > 70 ? 'warning' : 'success'}" 
                             style="width: ${data.memory_usage || 0}%"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span>磁盘</span>
                        <span>${data.disk_usage || 0}%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar bg-${data.disk_usage > 85 ? 'danger' : data.disk_usage > 70 ? 'warning' : 'success'}" 
                             style="width: ${data.disk_usage || 0}%"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span>Swap</span>
                        <span>${data.swap_usage || 0}%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar bg-${data.swap_usage > 80 ? 'danger' : 'warning'}" 
                             style="width: ${data.swap_usage || 0}%"></div>
                    </div>
                </div>
            `;
            
            if (data.items) {
                const categories = ['cpu', 'memory', 'disk', 'network', 'process', 'security'];
                categories.forEach(cat => {
                    const items = data.items.filter(i => i.category === cat);
                    let result = '';
                    items.forEach(item => {
                        result += `${item.check_item}: ${item.check_value}\n`;
                    });
                    document.getElementById(`${cat}Result`).textContent = result || '无数据';
                });
            }
        })
        .catch(error => {
            console.error('Load inspection detail failed:', error);
        });
}

loadInspectionDetail();
</script>
{% endblock %}
