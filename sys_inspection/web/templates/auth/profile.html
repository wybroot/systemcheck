{% extends "base.html" %}
{% block title %}个人资料 - {{ app_name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">个人资料</h5>
                </div>
                <div class="card-body">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" value="{{ current_user.username }}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" value="{{ current_user.email or '' }}">
                        </div>
                        <hr>
                        <div class="mb-3">
                            <label class="form-label">当前密码</label>
                            <input type="password" class="form-control" id="current_password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" id="new_password" minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary">保存修改</button>
                    </form>
                    <div id="profileMessage" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('profileForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const payload = {
        email: document.getElementById('email').value,
        current_password: document.getElementById('current_password').value,
        new_password: document.getElementById('new_password').value
    };

    axios.post('/auth/profile', payload)
        .then(() => {
            document.getElementById('profileMessage').innerHTML =
                '<div class="alert alert-success mb-0">更新成功</div>';
            document.getElementById('current_password').value = '';
            document.getElementById('new_password').value = '';
        })
        .catch(error => {
            const msg = error?.response?.data?.error || '更新失败';
            document.getElementById('profileMessage').innerHTML =
                `<div class="alert alert-danger mb-0">${msg}</div>`;
        });
});
</script>
{% endblock %}
